# ============================================================
# 队伍策略模板
# 复制本文件，重命名为 <队伍名>.yaml，按需填写
# ============================================================

# 队伍名称（与 teams.json 中一致）
team: 队伍名称

# ----------------------------------------------------------
# 首发精灵
# 留空或删除此行则使用队伍第一位精灵
# ----------------------------------------------------------
starter: 精灵名

# ----------------------------------------------------------
# 技能优先级
# 每只精灵列出技能名，从上到下优先级递减
# 权重：1st→3.0  2nd→2.0  3rd→1.5  4th→1.2
# ----------------------------------------------------------
skill_priority:
  精灵A: [技能1, 技能2, 技能3, 技能4]
  精灵B: [技能1, 技能2, 技能3, 技能4]

# ----------------------------------------------------------
# 换宠/行动规则（按顺序判断，第一个满足条件的生效）
#
# 可用条件（when）：
#   hp_pct < 30         己方当前精灵HP低于30%
#   hp_pct > 60         己方HP高于60%
#   energy < 3          己方能量低于3
#   energy > 7          己方能量高于7
#   type_disadvantaged  己方精灵属性被克制（承受≥2x伤害）
#   type_advantaged     己方精灵有属性克制对手
#   enemy_hp_pct < 30   对手HP低于30%
#   always              无条件（通常放最后作为默认）
#
# 可用动作（action）：
#   switch   换宠（需要配合 to 指定目标）
#   gather   强制聚能
#
# 换宠目标（to）：
#   highest_hp    换当前HP最高的队友
#   type_counter  换能克制对手属性的队友（无则换HP最高）
#   精灵名        换指定精灵（该精灵已倒下时忽略此规则）
# ----------------------------------------------------------
switch_rules:
  - when: type_disadvantaged
    action: switch
    to: type_counter

  - when: hp_pct < 25
    action: switch
    to: highest_hp

  - when: energy < 3
    action: gather

# ----------------------------------------------------------
# 全局偏好
#
#   prefer_gather_below_energy: 3
#       能量低于3时偏好聚能（权重提升至3.0）
#
#   prefer_attack_when_type_advantage: true
#       己方有属性克制时偏好使用克制属性技能
#
#   avoid_switch_when_hp_above: 60
#       HP高于60%时降低换宠权重（权重降至0.2）
# ----------------------------------------------------------
general:
  prefer_gather_below_energy: 3
  prefer_attack_when_type_advantage: true
  avoid_switch_when_hp_above: 60
