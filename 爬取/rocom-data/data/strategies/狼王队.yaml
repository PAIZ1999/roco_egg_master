# ============================================================
# 狼王队 战术策略
#
# 核心思路：
#   翠顶夫人首发 → 力量增效叠攻防buff → 利用洁癖将buff传递给后续精灵
#   翼龙作为主要站场输出（暴食特性使龙系技能获得先手）
#   音速犬游走打点（专注力特性使入场首回合物攻+100%）
#   卡瓦重优先速冻挂减速印记
#   画间沉铁兽针对已有强化的敌方精灵（变形活画特性：对手buff越多自身威力越高）
#   恶魔狼作为保底（悲悯特性：队友倒下越多自身双攻越高）
# ============================================================

team: 狼王队
starter: 翠顶夫人

# ----------------------------------------------------------
# 技能优先级
# 翠顶夫人：先积累buff，有克制时输出，洁癖传递增益
# 翼龙：克制技能冰爪优先，无克制则龙爪（暴食特性龙系先手）
# 音速犬：物攻技能全力，入场首回合专注力+100%，打完即换
# 卡瓦重：优先速冻挂减速印记，再筛管奔流/冰雹输出
# 画间沉铁兽：先发制人优先，对手buff越多先发制人越强
# 恶魔狼：先发制人作为保底输出手段
# ----------------------------------------------------------
skill_priority:
  翠顶夫人:   [力量增效, 水刃, 俯冲猛击, 水环]
  翼龙:       [冰爪, 龙爪, 爆冲, 羽刃]
  音速犬:     [当头棒喝, 焚烧烙印, 跌落, 灼伤]
  卡瓦重:     [速冻, 冰雹, 筛管奔流, 风矢]
  画间沉铁兽: [先发制人, 截拳, 冰爪, 有效预防]
  恶魔狼:     [先发制人, 火焰切割, 吞噬, 蝙蝠]

# ----------------------------------------------------------
# 换宠规则
# 注意：音速犬的"游走"逻辑（入场输出一次立即换出）
# 以及恶魔狼的"掉三格生命时出场"目前无法通过条件精确表达，
# 由 MCTS 结合技能优先级和以下规则共同决策。
# ----------------------------------------------------------
switch_rules:
  # 属性被克制时换克制对方的精灵（优先换翼龙）
  - when: type_disadvantaged
    action: switch
    to: type_counter

  # 濒死时换恶魔狼保底（悲悯特性在此时攻击最强）
  - when: hp_pct < 20
    action: switch
    to: 恶魔狼

  # 能量耗尽时聚能
  - when: energy < 2
    action: gather

general:
  prefer_gather_below_energy: 2
  prefer_attack_when_type_advantage: true
  # 翠顶夫人 HP 充足时留场继续积累buff或输出，不急于换人
  avoid_switch_when_hp_above: 65
