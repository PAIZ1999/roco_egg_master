# ============================================================
# 平衡狼王队 战术策略
#
# 核心思路：
#   黑猫巫师首发 → 魔能爆+魔法增效特性（+70%）开局强攻，
#   彗星作为次选输出，目标是迅速打掉第一只敌方精灵
#
#   黑猫巫师下场后换白金独角兽，依靠目空特性（非光系+25%）输出
#   若对手为草系精灵 → 换帕帕斯卡，俯冲猛击（翼轴特性1号位先手）
#
#   卡瓦重在恶魔狼上场前出场，速冻挂减速印记拖慢对手节奏
#
#   朔夜伊芙在恶魔狼出场前完成"buff中转"流程：
#     啮合传递（获取己方buff）→ 击鼓传花（将buff传给恶魔狼）→ 换出
#   注意：此流程依赖 MCTS 学习，YAML 仅通过技能优先级引导
#
#   恶魔狼最后出场作为保底站场（悲悯特性：队友倒下越多双攻越高）
# ============================================================

team: 平衡狼王队
starter: 黑猫巫师

# ----------------------------------------------------------
# 技能优先级
# 黑猫巫师：魔能爆优先（配合特性+70%），彗星作为次选，先打出最大输出
# 白金独角兽：非光系技能优先（目空特性加成），克制技能靠 general 引导
# 卡瓦重：速冻优先挂减速印记，丰饶辅助能量回复，筛管/冰雹补充输出
# 朔夜伊芙：啮合传递先拿buff，再击鼓传花传给恶魔狼，之后换出
# 帕帕斯卡：俯冲猛击位于1号位（翼轴特性先手），优先输出
# 恶魔狼：保底站场，优先持续输出技能
# ----------------------------------------------------------
skill_priority:
  黑猫巫师: [魔能爆, 彗星, 魔法增效, 恐吓]
  白金独角兽: [折射, 超导, 折线冲击, 气泡]
  卡瓦重: [速冻, 冰雹, 筛管奔流, 丰饶]
  朔夜伊芙: [啮合传递, 击鼓传花, 撕咬, 有效预防]
  帕帕斯卡: [俯冲猛击, 钢铁洪流, 齿轮扭矩, 轴承支撑]
  恶魔狼: [火焰切割, 蝙蝠, 惊吓盒子, 有效预防]

# ----------------------------------------------------------
# 换宠规则
# 注意：朔夜伊芙完成"啮合传递→击鼓传花"后主动换恶魔狼的时机
# 依赖 MCTS 学习，YAML 无法直接表达"已使用N个技能后换出"的条件。
# ----------------------------------------------------------
switch_rules:
  # 属性被克制时换属性克制对手的精灵
  # （白金独角兽遇草系时 → 换帕帕斯卡；其他情况找最优克制精灵）
  - when: type_disadvantaged
    action: switch
    to: type_counter

  # 白金独角兽/朔夜伊芙/卡瓦重 HP 濒危时换恶魔狼保底
  - when: hp_pct < 20
    action: switch
    to: 恶魔狼

  # 能量告急时聚能
  - when: energy < 2
    action: gather

general:
  prefer_gather_below_energy: 2
  prefer_attack_when_type_advantage: true
  # 黑猫巫师目标是打出高输出，HP 充足时继续攻击不换人
  avoid_switch_when_hp_above: 60
